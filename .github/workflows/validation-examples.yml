name: validation-examples

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/validation-examples.yml'
      - '.github/scripts/run-validation-example-android.sh'
      - 'examples/cockpit_demo/validation/**'
      - 'packages/cockpit/**'
      - 'packages/flutter_cockpit/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/validation-examples.yml'
      - '.github/scripts/run-validation-example-android.sh'
      - 'examples/cockpit_demo/validation/**'
      - 'packages/cockpit/**'
      - 'packages/flutter_cockpit/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'

defaults:
  run:
    shell: bash

jobs:
  validation-example:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runner: ubuntu-latest
            timeout: 70
          - platform: ios
            runner: macos-latest
            timeout: 70
          - platform: macos
            runner: macos-latest
            timeout: 45
          - platform: linux
            runner: ubuntu-latest
            timeout: 60
          - platform: windows
            runner: windows-2022
            timeout: 60
          - platform: web
            runner: ubuntu-latest
            timeout: 45

    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        if: matrix.platform == 'android'
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install platform dependencies
        timeout-minutes: 25
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt_retry() {
            for attempt in 1 2 3 4 5; do
              if "$@"; then return 0; fi
              echo "apt attempt $attempt failed, retrying in 10s..."
              sleep 10
            done
            "$@"
          }

          case "${{ matrix.platform }}" in
            android)
              apt_retry sudo apt-get update
              apt_retry sudo apt-get install -y --no-install-recommends ffmpeg
              export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
              export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
              set +o pipefail
              yes | sdkmanager --licenses > /dev/null
              set -o pipefail
              sdkmanager --install "platforms;android-36" "ndk;27.0.12077973"
              ;;
            ios|macos)
              brew install ffmpeg
              flutter config --enable-macos-desktop
              ;;
            linux)
              apt_retry sudo apt-get update
              apt_retry sudo apt-get install -y --no-install-recommends ffmpeg x11-utils xvfb \
                clang cmake git ninja-build pkg-config \
                libgtk-3-dev liblzma-dev libstdc++-12-dev
              flutter config --enable-linux-desktop
              ;;
            web)
              apt_retry sudo apt-get update
              apt_retry sudo apt-get install -y --no-install-recommends ffmpeg x11-utils xvfb
              ;;
            windows)
              choco install ffmpeg -y
              flutter config --enable-windows-desktop
              ;;
          esac

      - name: Enable KVM (Android only)
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Validate bundled YAML examples parse
        if: matrix.platform == 'macos'
        timeout-minutes: 5
        run: dart test packages/cockpit/test/src/examples/validation_examples_test.dart

      - name: Boot iOS simulator
        if: matrix.platform == 'ios'
        timeout-minutes: 12
        run: |
          set -eo pipefail
          IOS_DEVICE_CANDIDATES="$(python3 - <<'PY'
          import json, subprocess, sys
          data = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )
          preferred = ("iPhone 17", "iPhone 16", "iPhone 15", "iPhone 14")
          devices = []
          for runtime, entries in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for entry in entries:
                  if entry.get("isAvailable") and "iPhone" in entry.get("name", ""):
                      devices.append(entry)
          def sort_key(entry):
              name = entry["name"]
              try:
                  rank = next(i for i, prefix in enumerate(preferred) if name.startswith(prefix))
              except StopIteration:
                  rank = len(preferred)
              return (rank, name)
          if not devices:
              sys.exit("No available iOS simulator device found.")
          devices.sort(key=sort_key)
          for entry in devices[:4]:
              print(f"{entry['udid']} {entry['name']}")
          PY
          )"
          IOS_DEVICE_ID=""
          while IFS= read -r candidate; do
            [ -n "$candidate" ] || continue
            CANDIDATE_ID="${candidate%% *}"
            xcrun simctl shutdown "$CANDIDATE_ID" || true
            xcrun simctl boot "$CANDIDATE_ID" || true
            if python3 - "$CANDIDATE_ID" <<'PY'
          import subprocess, sys
          try:
              subprocess.run(["xcrun", "simctl", "bootstatus", sys.argv[1], "-b"],
                             check=True, timeout=150)
          except (subprocess.TimeoutExpired, subprocess.CalledProcessError) as error:
              sys.exit(getattr(error, 'returncode', 124))
          PY
            then
              IOS_DEVICE_ID="$CANDIDATE_ID"
              break
            fi
            xcrun simctl shutdown "$CANDIDATE_ID" || true
          done <<< "$IOS_DEVICE_CANDIDATES"
          if [ -z "$IOS_DEVICE_ID" ]; then
            echo "No iOS simulator reached booted state." >&2
            exit 1
          fi
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"

      - name: Run rapid validation workflow example (Android)
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 45
        env:
          ANDROID_AVD_HOME: ${{ runner.temp }}/avd
          APP_JSON: ${{ runner.temp }}/cockpit-demo-validation-app.json
          BUNDLE_DIR: ${{ runner.temp }}/cockpit-demo-validation-bundle
          LOG_PATH: ${{ runner.temp }}/cockpit-demo-validation.log
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
            -camera-back none -camera-front none
          script: |
            bash "$GITHUB_WORKSPACE/.github/scripts/run-validation-example-android.sh"

      - name: Run rapid validation workflow example
        if: matrix.platform != 'android' && matrix.platform != 'windows'
        working-directory: examples/cockpit_demo
        timeout-minutes: 35
        env:
          APP_JSON: ${{ runner.temp }}/cockpit-demo-validation-app.json
          BUNDLE_DIR: ${{ runner.temp }}/cockpit-demo-validation-bundle
          LOG_PATH: ${{ runner.temp }}/cockpit-demo-validation.log
          VALIDATION_DRIVER: ${{ runner.temp }}/cockpit-demo-validation-driver.sh
        run: |
          set +e
          set -o pipefail
          cat > "$VALIDATION_DRIVER" <<'SH'
          #!/usr/bin/env bash
          set +e
          DEVICE_ARGS=()
          if [ "$VALIDATION_PLATFORM" = "web" ]; then
            DEVICE_ARGS=(--device-id chrome)
          elif [ -n "${IOS_DEVICE_ID:-}" ]; then
            DEVICE_ARGS=(--device-id "$IOS_DEVICE_ID")
          fi
          dart run cockpit launch-app \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --target cockpit/main.dart \
            --platform "$VALIDATION_PLATFORM" \
            "${DEVICE_ARGS[@]}" \
            --session-port 58491 \
            --launch-timeout-seconds 600 \
            --app-json "$APP_JSON"
          LAUNCH_STATUS=$?
          if [ "$LAUNCH_STATUS" -ne 0 ]; then
            exit "$LAUNCH_STATUS"
          fi
          dart run cockpit run-script \
            --app-json "$APP_JSON" \
            --script validation/rapid-smoke.workflow.yaml \
            --platform "$VALIDATION_PLATFORM" \
            --output-root "$BUNDLE_DIR" 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          exit "$STATUS"
          SH
          chmod +x "$VALIDATION_DRIVER"

          export VALIDATION_PLATFORM="${{ matrix.platform }}"
          if [ "$VALIDATION_PLATFORM" = "linux" ] || [ "$VALIDATION_PLATFORM" = "web" ]; then
            xvfb-run -a "$VALIDATION_DRIVER"
            STATUS=$?
          else
            "$VALIDATION_DRIVER"
            STATUS=$?
          fi
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Run rapid validation workflow example (Windows)
        if: matrix.platform == 'windows'
        working-directory: examples/cockpit_demo
        timeout-minutes: 35
        shell: pwsh
        env:
          APP_JSON: ${{ runner.temp }}/cockpit-demo-validation-app.json
          BUNDLE_DIR: ${{ runner.temp }}/cockpit-demo-validation-bundle
          LOG_PATH: ${{ runner.temp }}/cockpit-demo-validation.log
        run: |
          $ErrorActionPreference = "Continue"
          dart run cockpit launch-app `
            --project-dir "$env:GITHUB_WORKSPACE/examples/cockpit_demo" `
            --target cockpit/main.dart `
            --platform windows `
            --session-port 58491 `
            --launch-timeout-seconds 600 `
            --app-json "$env:APP_JSON"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dart run cockpit run-script `
            --app-json "$env:APP_JSON" `
            --script validation/rapid-smoke.workflow.yaml `
            --platform windows `
            --output-root "$env:BUNDLE_DIR" 2>&1 | Tee-Object -FilePath "$env:LOG_PATH"
          exit $LASTEXITCODE

      - name: Resolve validation bundle
        if: always()
        env:
          BUNDLE_DIR: ${{ runner.temp }}/cockpit-demo-validation-bundle
        run: |
          set -eo pipefail
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "run-script did not create bundle root $BUNDLE_DIR" >&2
            exit 65
          fi
          RUN_SCRIPT_BUNDLE_DIR="$(
            find "$BUNDLE_DIR" -mindepth 2 -maxdepth 2 -name manifest.json -print \
              | sed 's#/manifest.json$##' \
              | sort \
              | tail -n 1
          )"
          if [ -z "$RUN_SCRIPT_BUNDLE_DIR" ]; then
            echo "run-script did not write a task bundle under $BUNDLE_DIR" >&2
            find "$BUNDLE_DIR" -maxdepth 3 -type f -print >&2 || true
            exit 65
          fi
          echo "RUN_SCRIPT_BUNDLE_DIR=$RUN_SCRIPT_BUNDLE_DIR" >> "$GITHUB_ENV"

      - name: Read validation bundle summary
        env:
          SUMMARY_JSON: ${{ runner.temp }}/cockpit-demo-validation-summary.json
        run: |
          dart run cockpit read-task-bundle-summary \
            --bundle-dir "$RUN_SCRIPT_BUNDLE_DIR" \
            --output "$SUMMARY_JSON" \
            --output-format json

      - name: Verify rapid validation bundle
        env:
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          SUMMARY_JSON: ${{ runner.temp }}/cockpit-demo-validation-summary.json
        run: |
          PY=python3
          command -v python3 >/dev/null 2>&1 || PY=python
          "$PY" - "$SUMMARY_JSON" <<'PY'
          import json, os, pathlib, sys
          platform = os.environ["EXPECTED_PLATFORM"]
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert data["manifest"]["status"] == "completed", data
          assert data["manifest"]["platform"] == platform, data
          evidence = data["evidenceSummary"]
          assert evidence["screenshotCount"] >= 1, data
          assert evidence["failureCount"] == 0, data
          delivery = data["delivery"]
          assert delivery["primaryScreenshotRef"], data
          PY

      - name: Upload validation example bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-demo-validation-example-${{ matrix.platform }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/cockpit-demo-validation-app.json
            ${{ runner.temp }}/cockpit-demo-validation-bundle
            ${{ runner.temp }}/cockpit-demo-validation-summary.json
            ${{ runner.temp }}/cockpit-demo-validation.log
