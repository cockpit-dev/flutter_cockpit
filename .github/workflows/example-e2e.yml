          LOG_PATH: ${{ runner.temp }}/rapid-dev-web.log
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify rapid-dev web result
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-web.json
        run: |
          python3 - "$RESULT_JSON" <<'PY'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continueRapidDevelopment", data
          platforms = data["platforms"]
          assert len(platforms) == 1, platforms
          p = platforms[0]
          assert p["platform"] == "web", p
          assert p["status"] == "passed", p
          assert p["hotReloadSucceeded"] is True, p
          assert p["waitIdleSucceeded"] is True, p
          assert p["runtimeErrorCount"] == 0, p
          assert p["initialRouteName"] == "/inbox", p
          assert p["postCreateRouteName"] == "/inbox", p
          assert p["postReloadRouteName"] == "/inbox", p
          assert p["createdTaskTitle"], p
          assert p["queueBrief"], p
          assert p["screenshotArtifactRef"], p
          assert p["screenshotByteLength"] > 0, p
          for cmd in ("launch-app", "read-app", "run-batch", "wait-idle",
                      "hot-reload", "capture-screenshot", "read-errors"):
              assert cmd in p["verifiedCommands"], f"missing {cmd}"
          PY

      - name: Upload bundle
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: rapid-dev-web-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/rapid-dev-web-out
            ${{ runner.temp }}/rapid-dev-web.json
            ${{ runner.temp }}/rapid-dev-web.log

  # ─────────────────────────────────────────────────────────────────────────
  # Rapid development loop on Linux desktop (xvfb).
  # ─────────────────────────────────────────────────────────────────────────
  rapid-dev-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Linux dependencies
        timeout-minutes: 25
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set +e
          APT_SUCCESS=false
          for i in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg x11-utils xvfb \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
              gstreamer1.0-libav clang cmake git ninja-build pkg-config \
              libgtk-3-dev liblzma-dev libstdc++-12-dev
            if [ $? -eq 0 ]; then APT_SUCCESS=true; break; fi
            echo "apt attempt $i failed, retrying in 10s..."
            sleep 10
          done
          set -e
          if [ "$APT_SUCCESS" != "true" ]; then
            echo "apt-get failed after 5 attempts" >&2
            exit 1
          fi

      - name: Enable Linux desktop
        shell: bash
        run: flutter config --enable-linux-desktop

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run rapid-dev verifier (Linux)
        working-directory: examples/cockpit_demo
        timeout-minutes: 30
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/rapid-dev-linux-out
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-linux.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-linux.log
        run: |
          set +e
          set -o pipefail
          xvfb-run -a dart run tool/verify_rapid_dev.dart \
            --platform linux \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 600 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Print diagnostics
        if: failure()
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-linux.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-linux.log
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify rapid-dev Linux result
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-linux.json
        run: |
          python3 - "$RESULT_JSON" <<'PY'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continueRapidDevelopment", data
          platforms = data["platforms"]
          assert len(platforms) == 1, platforms
          p = platforms[0]
          assert p["platform"] == "linux", p
          assert p["status"] == "passed", p
          assert p["hotReloadSucceeded"] is True, p
          assert p["waitIdleSucceeded"] is True, p
          assert p["runtimeErrorCount"] == 0, p
          assert p["initialRouteName"] == "/inbox", p
          assert p["postCreateRouteName"] == "/inbox", p
          assert p["postReloadRouteName"] == "/inbox", p
          assert p["createdTaskTitle"], p
          assert p["queueBrief"], p
          assert p["screenshotArtifactRef"], p
          assert p["screenshotByteLength"] > 0, p
          for cmd in ("launch-app", "read-app", "run-batch", "wait-idle",
                      "hot-reload", "capture-screenshot", "read-errors"):
              assert cmd in p["verifiedCommands"], f"missing {cmd}"
          PY

      - name: Upload bundle
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: rapid-dev-linux-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/rapid-dev-linux-out
            ${{ runner.temp }}/rapid-dev-linux.json
            ${{ runner.temp }}/rapid-dev-linux.log

  # ─────────────────────────────────────────────────────────────────────────
  # Rapid development loop on Windows desktop.
  # ─────────────────────────────────────────────────────────────────────────
  rapid-dev-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run rapid-dev verifier (Windows)
        working-directory: examples/cockpit_demo
        timeout-minutes: 40
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/rapid-dev-windows-out
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-windows.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-windows.log
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          dart run tool/verify_rapid_dev.dart `
            --platform windows `
            --project-dir "$env:GITHUB_WORKSPACE/examples/cockpit_demo" `
            --output-root "$env:OUTPUT_ROOT" `
            --output "$env:RESULT_JSON" `
            --output-format json `
            --launch-timeout-seconds 600 2>&1 | Tee-Object -FilePath "$env:LOG_PATH"
          exit $LASTEXITCODE

      - name: Print diagnostics
        if: failure()
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-windows.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-windows.log
        shell: pwsh
        run: |
          if (Test-Path "$env:LOG_PATH") { Get-Content "$env:LOG_PATH" }
          if (Test-Path "$env:RESULT_JSON") { Get-Content "$env:RESULT_JSON" }

      - name: Verify rapid-dev Windows result
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-windows.json
        run: |
          python - "$RESULT_JSON" <<'PY'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continueRapidDevelopment", data
          platforms = data["platforms"]
          assert len(platforms) == 1, platforms
          p = platforms[0]
          assert p["platform"] == "windows", p
          assert p["status"] == "passed", p
          assert p["hotReloadSucceeded"] is True, p
          assert p["waitIdleSucceeded"] is True, p
          assert p["runtimeErrorCount"] == 0, p
          assert p["initialRouteName"] == "/inbox", p
          assert p["postCreateRouteName"] == "/inbox", p
          assert p["postReloadRouteName"] == "/inbox", p
          assert p["createdTaskTitle"], p
          assert p["queueBrief"], p
          assert p["screenshotArtifactRef"], p
          assert p["screenshotByteLength"] > 0, p
          for cmd in ("launch-app", "read-app", "run-batch", "wait-idle",
                      "hot-reload", "capture-screenshot", "read-errors"):
              assert cmd in p["verifiedCommands"], f"missing {cmd}"
          PY

      - name: Upload bundle
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: rapid-dev-windows-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/rapid-dev-windows-out
            ${{ runner.temp }}/rapid-dev-windows.json
            ${{ runner.temp }}/rapid-dev-windows.log
