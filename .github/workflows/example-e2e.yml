name: example-e2e

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'packages/flutter_cockpit/**'
      - 'packages/cockpit/**'
      - 'examples/cockpit_demo/**'
      - '.github/workflows/example-e2e.yml'
      - 'pubspec.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Rapid development loop on macOS + iOS simulator.
  # Exercises: edit → create-task → hot-reload → assert → screenshot → read-errors
  # ─────────────────────────────────────────────────────────────────────────
  rapid-dev-macos-ios:
    runs-on: macos-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        timeout-minutes: 15
        run: brew install ffmpeg

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Boot iOS simulator
        timeout-minutes: 10
        run: |
          set -eo pipefail
          IOS_DEVICE_CANDIDATES="$(python3 - <<'PY'
          import json, subprocess, sys
          data = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )
          preferred = ("iPhone 17", "iPhone 16", "iPhone 15", "iPhone 14")
          devices = []
          for runtime, entries in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for entry in entries:
                  if entry.get("isAvailable") and "iPhone" in entry.get("name", ""):
                      devices.append(entry)
          def sort_key(entry):
              name = entry["name"]
              try:
                  rank = next(i for i, prefix in enumerate(preferred) if name.startswith(prefix))
              except StopIteration:
                  rank = len(preferred)
              return (rank, name)
          if not devices:
              sys.exit("No available iOS simulator device found.")
          devices.sort(key=sort_key)
          for entry in devices[:4]:
              print(f"{entry['udid']} {entry['name']}")
          PY
          )"
          IOS_DEVICE_ID=""
          while IFS= read -r candidate; do
            [ -n "$candidate" ] || continue
            CANDIDATE_ID="${candidate%% *}"
            xcrun simctl shutdown "$CANDIDATE_ID" || true
            xcrun simctl boot "$CANDIDATE_ID" || true
            if python3 - "$CANDIDATE_ID" <<'PY'
          import subprocess, sys
          try:
              subprocess.run(
                  ["xcrun", "simctl", "bootstatus", sys.argv[1], "-b"],
                  check=True, timeout=150,
              )
          except (subprocess.TimeoutExpired, subprocess.CalledProcessError) as error:
              sys.exit(getattr(error, 'returncode', 124))
          PY
            then
              IOS_DEVICE_ID="$CANDIDATE_ID"
              break
            fi
            xcrun simctl shutdown "$CANDIDATE_ID" || true
          done <<< "$IOS_DEVICE_CANDIDATES"
          if [ -z "$IOS_DEVICE_ID" ]; then
            echo "No iOS simulator reached booted state." >&2
            exit 1
          fi
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"

      - name: Run rapid-dev verifier (macOS + iOS)
        working-directory: examples/cockpit_demo
        timeout-minutes: 35
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/rapid-dev-macos-ios-out
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-macos-ios.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-macos-ios.log
        run: |
          set +e
          set -o pipefail
          dart run tool/verify_rapid_dev.dart \
            --platform macos \
            --platform ios \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 600 \
            --device-timeout-seconds 600 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Print diagnostics
        if: failure()
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-macos-ios.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-macos-ios.log
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify rapid-dev result
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-macos-ios.json
        run: |
          python3 - "$RESULT_JSON" <<'PY'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continueRapidDevelopment", data
          platforms = data["platforms"]
          assert len(platforms) == 2, f"expected 2, got {len(platforms)}"
          by_platform = {p["platform"]: p for p in platforms}
          assert set(by_platform.keys()) == {"macos", "ios"}, by_platform
          for name, p in by_platform.items():
              assert p["status"] == "passed", p
              assert p["hotReloadSucceeded"] is True, p
              assert p["waitIdleSucceeded"] is True, p
              assert p["runtimeErrorCount"] == 0, p
              assert p["initialRouteName"] == "/inbox", p
              assert p["postCreateRouteName"] == "/inbox", p
              assert p["postReloadRouteName"] == "/inbox", p
              assert p["createdTaskTitle"], p
              assert p["queueBrief"], p
              assert p["screenshotArtifactRef"], p
              assert p["screenshotByteLength"] > 0, p
              for cmd in ("launch-app", "read-app", "run-batch", "wait-idle",
                          "hot-reload", "capture-screenshot", "read-errors"):
                  assert cmd in p["verifiedCommands"], f"{name}: missing {cmd}"
          PY

      - name: Upload bundle
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: rapid-dev-macos-ios-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/rapid-dev-macos-ios-out
            ${{ runner.temp }}/rapid-dev-macos-ios.json
            ${{ runner.temp }}/rapid-dev-macos-ios.log

  # ─────────────────────────────────────────────────────────────────────────
  # Rapid development loop on Android emulator.
  # ─────────────────────────────────────────────────────────────────────────
  rapid-dev-android:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android dependencies
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y ffmpeg && break
            sleep 5
          done
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          set -o pipefail
          sdkmanager --install "platforms;android-36" "ndk;27.0.12077973"

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run rapid-dev verifier (Android)
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 50
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/rapid-dev-android-out
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-android.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-android.log
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
            -camera-back none -camera-front none
          script: >-
            set -e;
            adb devices;
            cd "$GITHUB_WORKSPACE/examples/cockpit_demo";
            dart run tool/verify_rapid_dev.dart --platform android
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo"
            --output-root "$OUTPUT_ROOT"
            --output "$RESULT_JSON"
            --output-format json
            --android-emulator-id "Pixel_9_Pro"
            --launch-timeout-seconds 600
            --device-timeout-seconds 600 2>&1 | tee "$LOG_PATH"

      - name: Print diagnostics
        if: failure()
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-android.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-android.log
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify rapid-dev Android result
        env:
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-android.json
        run: |
          python3 - "$RESULT_JSON" <<'PY'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continueRapidDevelopment", data
          platforms = data["platforms"]
          assert len(platforms) == 1, platforms
          p = platforms[0]
          assert p["platform"] == "android", p
          assert p["status"] == "passed", p
          assert p["hotReloadSucceeded"] is True, p
          assert p["waitIdleSucceeded"] is True, p
          assert p["runtimeErrorCount"] == 0, p
          assert p["initialRouteName"] == "/inbox", p
          assert p["postCreateRouteName"] == "/inbox", p
          assert p["postReloadRouteName"] == "/inbox", p
          assert p["createdTaskTitle"], p
          assert p["queueBrief"], p
          assert p["screenshotArtifactRef"], p
          assert p["screenshotByteLength"] > 0, p
          for cmd in ("launch-app", "read-app", "run-batch", "wait-idle",
                      "hot-reload", "capture-screenshot", "read-errors"):
              assert cmd in p["verifiedCommands"], f"missing {cmd}"
          PY

      - name: Upload bundle
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: rapid-dev-android-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/rapid-dev-android-out
            ${{ runner.temp }}/rapid-dev-android.json
            ${{ runner.temp }}/rapid-dev-android.log

  # ─────────────────────────────────────────────────────────────────────────
  # Rapid development loop on Web (Chrome via xvfb).
  # ─────────────────────────────────────────────────────────────────────────
