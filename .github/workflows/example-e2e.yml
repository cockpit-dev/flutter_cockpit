      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Web dependencies
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y ffmpeg x11-utils xvfb && break
            sleep 5
          done

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run rapid-dev verifier (Web)
        working-directory: examples/cockpit_demo
        timeout-minutes: 30
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/rapid-dev-web-out
          RESULT_JSON: ${{ runner.temp }}/rapid-dev-web.json
          LOG_PATH: ${{ runner.temp }}/rapid-dev-web.log
        run: |
          set +e
          set -o pipefail
          xvfb-run -a dart run tool/verify_rapid_dev.dart \
            --platform web \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 600 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
