  linux-runtime-loop:
    needs: shared-ai-surface-regressions
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Linux desktop dependencies
        timeout-minutes: 15
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            xvfb \
            x11-utils \
            ffmpeg

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run Linux desktop devtools regression tests
        timeout-minutes: 15
        working-directory: packages/flutter_cockpit_devtools
        run: |
          dart test \
            test/src/session/cockpit_remote_session_launcher_test.dart \
            test/src/session/cockpit_linux_remote_session_launcher_test.dart \
            test/src/application/cockpit_launch_development_session_service_test.dart \
            test/src/capture/cockpit_linux_capture_adapter_test.dart \
            test/src/capture/cockpit_capture_strategy_resolver_test.dart \
            test/src/recording/cockpit_linux_recording_adapter_test.dart \
            test/src/recording/cockpit_recording_strategy_resolver_test.dart

      - name: Prepare Linux verifier outputs
        run: |
          OUTPUT_ROOT="$RUNNER_TEMP/flutter_cockpit_linux_out"
          RESULT_JSON="$RUNNER_TEMP/flutter_cockpit_linux_verification.json"
          LOG_PATH="$RUNNER_TEMP/flutter_cockpit_linux_verification.log"
          echo "OUTPUT_ROOT=$OUTPUT_ROOT" >> "$GITHUB_ENV"
          echo "RESULT_JSON=$RESULT_JSON" >> "$GITHUB_ENV"
          echo "LOG_PATH=$LOG_PATH" >> "$GITHUB_ENV"

      - name: Run Linux full verifier
        working-directory: examples/cockpit_demo
        timeout-minutes: 30
        run: |
          set -eo pipefail
          xvfb-run -a dart run tool/verify_platforms.dart --platform linux \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 300 2>&1 | tee "$LOG_PATH"

      - name: Print Linux verifier diagnostics
        if: failure()
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify Linux runtime loop result
        env:
          EXPECTED_PLATFORM: linux
          EXPECTED_RECORDING_DRIVER: remote
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          expected_commands = [
              "launch-app",
              "read-app",
              "inspect-ui",
              "run-batch",
              "start-recording",
              "stop-recording",
              "wait-idle",
              "sync_lab_conflict_recovery",
              "read-network",
              "read-errors",
              "read-logs",
              "inspect-surface",
              "capture-screenshot",
              "hot-reload",
              "hot-restart",
          ]

          result_path = pathlib.Path(os.environ["RESULT_JSON"])
          data = json.loads(result_path.read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continue", data
          assert len(data["platforms"]) == 1, data
          platform = data["platforms"][0]
          assert platform["platform"] == os.environ["EXPECTED_PLATFORM"], platform
          assert platform["status"] == "passed", platform
          assert platform["verifiedCommands"] == expected_commands, platform
          assert platform["recordingDriver"] == os.environ["EXPECTED_RECORDING_DRIVER"], platform
          assert platform["batchCommandCount"] == 30, platform
          assert platform["networkFailureCount"] == 0, platform
          assert platform["runtimeErrorCount"] == 0, platform
          assert platform["hotReloadSucceeded"] is True, platform
          assert platform["hotRestartSucceeded"] is True, platform
          assert platform["waitIdleSucceeded"] is True, platform
          assert platform["recordingArtifactRef"], platform
          assert platform["recordingOutputPath"], platform
          assert platform["screenshotArtifactRef"], platform
          assert platform["screenshotByteLength"] > 0, platform
          PY

      - name: Upload Linux runtime loop bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-runtime-loop-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ env.OUTPUT_ROOT }}
            ${{ env.RESULT_JSON }}
            ${{ env.LOG_PATH }}

