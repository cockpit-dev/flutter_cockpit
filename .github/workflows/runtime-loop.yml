  web-runtime-loop:
    needs: shared-ai-surface-regressions
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install web validation dependencies
        timeout-minutes: 15
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg x11-utils xvfb

      - name: Resolve Chrome executable
        timeout-minutes: 5
        run: |
          CHROME_EXECUTABLE="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$CHROME_EXECUTABLE" ]; then
            echo "No supported Chrome or Chromium executable found on the runner." >&2
            exit 1
          fi
          echo "CHROME_EXECUTABLE=$CHROME_EXECUTABLE" >> "$GITHUB_ENV"
          "$CHROME_EXECUTABLE" --version

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Prepare web verifier outputs
        run: |
          OUTPUT_ROOT="$RUNNER_TEMP/flutter_cockpit_web_out"
          RESULT_JSON="$RUNNER_TEMP/flutter_cockpit_web_verification.json"
          LOG_PATH="$RUNNER_TEMP/flutter_cockpit_web_verification.log"
          echo "OUTPUT_ROOT=$OUTPUT_ROOT" >> "$GITHUB_ENV"
          echo "RESULT_JSON=$RESULT_JSON" >> "$GITHUB_ENV"
          echo "LOG_PATH=$LOG_PATH" >> "$GITHUB_ENV"

      - name: Run web full verifier
        working-directory: examples/cockpit_demo
        timeout-minutes: 35
        run: |
          set -eo pipefail
          xvfb-run -a dart run tool/verify_platforms.dart --platform web \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 300 2>&1 | tee "$LOG_PATH"

      - name: Print web verifier diagnostics
        if: failure()
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify web runtime loop result
        env:
          EXPECTED_PLATFORM: web
          EXPECTED_RECORDING_DRIVER: browser-host
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          expected_commands = [
              "launch-app",
