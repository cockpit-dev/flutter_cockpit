name: runtime-loop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'

defaults:
  run:
    shell: bash

jobs:
  shared-ai-surface-regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Install shared validation dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run publish readiness gates
        timeout-minutes: 20
        run: |
          dart format --output=none --set-exit-if-changed \
            packages/flutter_cockpit \
            packages/flutter_cockpit_devtools \
            examples/cockpit_demo \
            test
          dart analyze packages/flutter_cockpit packages/flutter_cockpit_devtools examples/cockpit_demo test
          (cd packages/flutter_cockpit && flutter pub publish --dry-run)
          (cd packages/flutter_cockpit_devtools && dart pub publish --dry-run)

      - name: Run full shared regression suite
        timeout-minutes: 35
        run: |
          dart test test
          (cd packages/flutter_cockpit && flutter test)
          (cd packages/flutter_cockpit_devtools && dart test)
          (cd examples/cockpit_demo && flutter test)

  macos-mcp-surface:
    needs: shared-ai-surface-regressions
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install macOS MCP verification dependencies
        timeout-minutes: 15
        run: brew install ffmpeg

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run MCP surface verification
        working-directory: packages/flutter_cockpit_devtools
        timeout-minutes: 45
        run: |
          MCP_VERIFY_LOG="$RUNNER_TEMP/flutter_cockpit_mcp_surface.log"
          echo "MCP_VERIFY_LOG=$MCP_VERIFY_LOG" >> "$GITHUB_ENV"
          set +e
          set -o pipefail
          dart run tool/verify_mcp_surface.dart 2>&1 | tee "$MCP_VERIFY_LOG"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          MCP_VERIFY_JSON="$(tail -n 1 "$MCP_VERIFY_LOG")"
          echo "MCP_VERIFY_JSON=$MCP_VERIFY_JSON" >> "$GITHUB_ENV"
          if [ "$STATUS" -ne 0 ]; then
            exit "$STATUS"
          fi
          if [ ! -f "$MCP_VERIFY_JSON" ]; then
            echo "Expected MCP verification report path on the last log line, got: $MCP_VERIFY_JSON" >&2
            exit 1
          fi

      - name: Print MCP surface diagnostics
        if: failure()
        run: |
          [ -f "$MCP_VERIFY_LOG" ] && cat "$MCP_VERIFY_LOG" || true
          [ -n "$MCP_VERIFY_JSON" ] && [ -f "$MCP_VERIFY_JSON" ] && cat "$MCP_VERIFY_JSON" || true

      - name: Verify MCP surface report
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          report_path = pathlib.Path(os.environ["MCP_VERIFY_JSON"])
          report = json.loads(report_path.read_text())
          mcp_cli = report["mcp_cli_verification"]
          workspace = report["workspace_verification"]
          target = report["target_verification"]
          app = report["app_verification"]

          for key in ("initialize", "toolNames", "resourceNames", "listTargets"):
              assert key in mcp_cli, key

          assert "launch_app" in mcp_cli["toolNames"], mcp_cli
          assert "launch_target" in mcp_cli["toolNames"], mcp_cli
          assert "validate_task" in mcp_cli["toolNames"], mcp_cli

          for key in (
              "pub_dev_search",
              "pub_get",
              "pub_add",
              "pub_deps",
              "pub_outdated",
              "pub_upgrade",
              "package_uri_tool",
              "package_uri_resource",
              "grep_package_uris",
              "lsp_hover",
              "lsp_definition",
              "lsp_signature_help",
              "lsp_document_symbols",
              "lsp_workspace_symbols",
              "analyze_files",
              "format_workspace",
              "apply_fixes",
              "run_tests",
              "analyze_workspace",
              "pub_remove",
          ):
              assert key in workspace, key

          for key in (
              "launch_target",
              "read_target",
              "inspect_surface",
              "run_shell_host",
              "run_shell_target",
          ):
              assert key in target, key

          assert target["launch_target"]["target"]["targetKind"] == "desktopApp", target
          assert target["read_target"]["selectedPlane"] == "flutterSemanticPlane", target
          assert target["inspect_surface"]["selectedPlane"] == "flutterSemanticPlane", target
          assert target["run_shell_host"]["success"] is True, target
          assert target["run_shell_target"]["success"] is True, target

          for key in (
              "list_targets",
              "launch_app",
              "list_apps",
              "apps_resource",
              "app_resource",
              "read_app",
              "inspect_ui_inbox",
              "open_settings",
              "wait_idle_after_settings",
              "inspect_ui_settings",
              "scroll_sync_check",
              "tap_sync_check",
              "wait_idle_after_sync_check",
              "read_network",
              "scroll_debug_log",
              "tap_debug_log",
              "read_logs",
              "start_recording",
              "tap_runtime_error",
              "read_errors",
              "stop_recording",
              "run_batch",
              "wait_idle",
              "hot_reload",
              "hot_restart",
              "read_app_after_restart",
              "run_script",
              "read_task_bundle_summary",
              "runTask",
              "latest_task_resource",
              "validate_task",
              "stop_app",
              "list_apps_after_stop",
          ):
              assert key in app, key

          assert app["validate_task"]["classification"] == "completed", app["validate_task"]
          assert app["runTask"]["classification"] == "completed", app["runTask"]
          assert app["read_network"]["summary"]["failureCount"] == 0, app["read_network"]
          assert app["read_errors"]["errors"], app["read_errors"]
          assert app["stop_recording"]["artifact"]["relativePath"], app["stop_recording"]
          PY

      - name: Expose MCP verify root
        run: |
          MCP_VERIFY_ROOT="$(python3 - <<'PY'
          import json, os, pathlib
          report_path = pathlib.Path(os.environ["MCP_VERIFY_JSON"])
          report = json.loads(report_path.read_text())
          print(report["verify_root"])
          PY
          )"
          echo "MCP_VERIFY_ROOT=$MCP_VERIFY_ROOT" >> "$GITHUB_ENV"

      - name: Upload MCP surface artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-mcp-surface
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ env.MCP_VERIFY_ROOT }}
            ${{ env.MCP_VERIFY_JSON }}
            ${{ env.MCP_VERIFY_LOG }}

  android-runtime-loop:
    needs: shared-ai-surface-regressions
    runs-on: ubuntu-latest
    timeout-minutes: 85

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android validation dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          set -o pipefail
          sdkmanager --install \
            "platforms;android-36" \
            "ndk;27.0.12077973"

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run Android devtools regression tests
        timeout-minutes: 15
        working-directory: packages/flutter_cockpit_devtools
        run: |
          dart test \
            test/src/session/cockpit_remote_session_launcher_test.dart \
            test/src/remote/cockpit_android_port_forwarder_test.dart \
            test/src/application/cockpit_launch_development_session_service_test.dart \
            test/src/capture/cockpit_capture_strategy_resolver_test.dart \
            test/src/recording/cockpit_adb_recording_adapter_test.dart \
            test/src/recording/cockpit_recording_strategy_resolver_test.dart

      - name: Prepare Android verifier outputs
        run: |
          OUTPUT_ROOT="$RUNNER_TEMP/flutter_cockpit_android_out"
          RESULT_JSON="$RUNNER_TEMP/flutter_cockpit_android_verification.json"
          LOG_PATH="$RUNNER_TEMP/flutter_cockpit_android_verification.log"
          echo "OUTPUT_ROOT=$OUTPUT_ROOT" >> "$GITHUB_ENV"
          echo "RESULT_JSON=$RESULT_JSON" >> "$GITHUB_ENV"
          echo "LOG_PATH=$LOG_PATH" >> "$GITHUB_ENV"

      - name: Run Android full verifier
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 50
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
            -camera-back none -camera-front none
          script: >-
            adb devices &&
            cd "$GITHUB_WORKSPACE/examples/cockpit_demo" &&
            if dart run tool/verify_platforms.dart --platform android
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo"
            --output-root "$OUTPUT_ROOT"
            --output "$RESULT_JSON"
            --output-format json
            --android-emulator-id "Pixel_9_Pro"
            --launch-timeout-seconds 600 >"$LOG_PATH" 2>&1;
            then cat "$LOG_PATH";
            else status=$?; cat "$LOG_PATH" || true; cat "$RESULT_JSON" || true; exit "$status"; fi

      - name: Print Android verifier diagnostics
        if: failure()
        run: |
          [ -f "$LOG_PATH" ] && cat "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify Android runtime loop result
        env:
          EXPECTED_PLATFORM: android
          EXPECTED_RECORDING_DRIVER: adb
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          expected_commands = [
              "launch-app",
              "read-app",
              "inspect-ui",
              "run-batch",
              "start-recording",
              "stop-recording",
              "wait-idle",
              "sync_lab_conflict_recovery",
              "read-network",
              "read-errors",
              "read-logs",
              "inspect-surface",
              "capture-screenshot",
              "hot-reload",
              "hot-restart",
          ]

          result_path = pathlib.Path(os.environ["RESULT_JSON"])
          data = json.loads(result_path.read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continue", data
          assert len(data["platforms"]) == 1, data
          platform = data["platforms"][0]
          assert platform["platform"] == os.environ["EXPECTED_PLATFORM"], platform
          assert platform["status"] == "passed", platform
          assert platform["verifiedCommands"] == expected_commands, platform
          assert platform["recordingDriver"] == os.environ["EXPECTED_RECORDING_DRIVER"], platform
          assert platform["batchCommandCount"] == 30, platform
          assert platform["networkFailureCount"] == 0, platform
          assert platform["runtimeErrorCount"] == 0, platform
          assert platform["hotReloadSucceeded"] is True, platform
          assert platform["hotRestartSucceeded"] is True, platform
          assert platform["waitIdleSucceeded"] is True, platform
          assert platform["recordingArtifactRef"], platform
          assert platform["recordingOutputPath"], platform
          assert platform["screenshotArtifactRef"], platform
          assert platform["screenshotByteLength"] > 0, platform
          PY

      - name: Upload Android runtime loop bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-runtime-loop-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ env.OUTPUT_ROOT }}
            ${{ env.RESULT_JSON }}
            ${{ env.LOG_PATH }}

  ios-runtime-loop:
    needs: shared-ai-surface-regressions
    runs-on: macos-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install iOS validation dependencies
        timeout-minutes: 15
        run: brew install ffmpeg

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      - name: Run iOS devtools regression tests
        timeout-minutes: 15
        working-directory: packages/flutter_cockpit_devtools
        run: |
          dart test \
            test/src/session/cockpit_remote_session_launcher_test.dart \
            test/src/application/cockpit_launch_development_session_service_test.dart \
            test/src/capture/cockpit_capture_strategy_resolver_test.dart \
            test/src/recording/cockpit_simctl_recording_adapter_test.dart \
            test/src/recording/cockpit_recording_strategy_resolver_test.dart

      - name: Boot iOS simulator
        timeout-minutes: 10
        run: |
          IOS_DEVICE_ID="$(python3 - <<'PY'
          import json
          import subprocess
          import sys

          data = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )
          preferred = ("iPhone 17", "iPhone 16", "iPhone 15", "iPhone 14")
          devices = []
          for runtime, entries in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for entry in entries:
                  if entry.get("isAvailable") and "iPhone" in entry.get("name", ""):
                      devices.append(entry)

          def sort_key(entry):
              name = entry["name"]
              try:
                  rank = next(i for i, prefix in enumerate(preferred) if name.startswith(prefix))
              except StopIteration:
                  rank = len(preferred)
              return (rank, name)

          if not devices:
              sys.exit("No available iOS simulator device found.")

          devices.sort(key=sort_key)
          print(devices[0]["udid"])
          PY
          )"
          xcrun simctl boot "$IOS_DEVICE_ID" || true
          xcrun simctl bootstatus "$IOS_DEVICE_ID" -b
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"

      - name: Prepare iOS verifier outputs
        run: |
          OUTPUT_ROOT="$RUNNER_TEMP/flutter_cockpit_ios_out"
          RESULT_JSON="$RUNNER_TEMP/flutter_cockpit_ios_verification.json"
          LOG_PATH="$RUNNER_TEMP/flutter_cockpit_ios_verification.log"
          echo "OUTPUT_ROOT=$OUTPUT_ROOT" >> "$GITHUB_ENV"
          echo "RESULT_JSON=$RESULT_JSON" >> "$GITHUB_ENV"
          echo "LOG_PATH=$LOG_PATH" >> "$GITHUB_ENV"

      - name: Run iOS full verifier
        working-directory: examples/cockpit_demo
        timeout-minutes: 35
        run: |
          set -eo pipefail
          dart run tool/verify_platforms.dart --platform ios \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 300 2>&1 | tee "$LOG_PATH"

      - name: Verify iOS runtime loop result
        env:
          EXPECTED_PLATFORM: ios
          EXPECTED_RECORDING_DRIVER: simctl
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          expected_commands = [
              "launch-app",
              "read-app",
              "inspect-ui",
              "run-batch",
              "start-recording",
              "stop-recording",
              "wait-idle",
              "sync_lab_conflict_recovery",
              "read-network",
              "read-errors",
              "read-logs",
              "inspect-surface",
              "capture-screenshot",
              "hot-reload",
              "hot-restart",
          ]

          result_path = pathlib.Path(os.environ["RESULT_JSON"])
          data = json.loads(result_path.read_text())
          assert data["success"] is True, data
          assert data["recommendedNextStep"] == "continue", data
          assert len(data["platforms"]) == 1, data
          platform = data["platforms"][0]
          assert platform["platform"] == os.environ["EXPECTED_PLATFORM"], platform
          assert platform["status"] == "passed", platform
          assert platform["verifiedCommands"] == expected_commands, platform
          assert platform["recordingDriver"] == os.environ["EXPECTED_RECORDING_DRIVER"], platform
          assert platform["batchCommandCount"] == 30, platform
          assert platform["networkFailureCount"] == 0, platform
          assert platform["runtimeErrorCount"] == 0, platform
          assert platform["hotReloadSucceeded"] is True, platform
          assert platform["hotRestartSucceeded"] is True, platform
          assert platform["waitIdleSucceeded"] is True, platform
          assert platform["recordingArtifactRef"], platform
          assert platform["recordingOutputPath"], platform
          assert platform["screenshotArtifactRef"], platform
          assert platform["screenshotByteLength"] > 0, platform
          PY

      - name: Upload iOS runtime loop bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-runtime-loop-bundle
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ env.OUTPUT_ROOT }}
            ${{ env.RESULT_JSON }}
            ${{ env.LOG_PATH }}

