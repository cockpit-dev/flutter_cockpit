name: platform-capabilities

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'packages/cockpit/lib/src/system_control/**'
      - 'packages/cockpit/lib/src/cli/**'
      - 'packages/cockpit/bin/**'
      - 'packages/flutter_cockpit/lib/src/remote/**'
      - 'examples/cockpit_demo/tool/**'
      - '.github/workflows/platform-capabilities.yml'
      - 'pubspec.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'

# ─────────────────────────────────────────────────────────────────────────
# Full per-platform system control capability verification.
#
# Each job launches cockpit_demo on a real device/simulator and runs
# verify_platforms.dart with --exhaustive-system-control, which exercises
# EVERY available system control action (not just the 6 core ones from
# runtime-loop.yml). This validates the complete platform capability
# surface end-to-end against a running app.
# ─────────────────────────────────────────────────────────────────────────
jobs:
  verify-capabilities:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runner: ubuntu-latest
            adapter: android.adb
            timeout: 85
          - platform: ios
            runner: macos-latest
            adapter: ios.simctl+xctest
            timeout: 100
          - platform: macos
            runner: macos-latest
            adapter: macos.accessibility+screencapture
            timeout: 60
          - platform: linux
            runner: ubuntu-latest
            adapter: linux.at-spi+x11+portal
            timeout: 60
          - platform: windows
            runner: windows-2022
            adapter: windows.uia+sendinput
            timeout: 80
          - platform: web
            runner: ubuntu-latest
            adapter: browser.dom+host-recording
            timeout: 60

    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - uses: actions/setup-java@v5
        if: matrix.platform == 'android'
        with:
          distribution: temurin
          java-version: '17'

      - name: Install platform dependencies
        timeout-minutes: 15
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt_retry() {
            for attempt in 1 2 3; do
              if "$@"; then return 0; fi
              echo "apt attempt $attempt failed, retrying..."
              sleep 5
            done
            "$@"
          }
          case "${{ matrix.platform }}" in
            android)
              apt_retry sudo apt-get update
              apt_retry sudo apt-get install -y --no-install-recommends ffmpeg
              export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
              export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
              set +o pipefail
              yes | sdkmanager --licenses > /dev/null
              set -o pipefail
              sdkmanager --install "platforms;android-36" "ndk;27.0.12077973"
              ;;
            ios|macos)
              brew install ffmpeg
              flutter config --enable-macos-desktop
              ;;
            linux)
              apt_retry sudo apt-get update
              apt_retry sudo apt-get install -y --no-install-recommends ffmpeg x11-utils xvfb xdotool xclip \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                gstreamer1.0-libav clang cmake git ninja-build pkg-config \
                libgtk-3-dev liblzma-dev libstdc++-12-dev
              flutter config --enable-linux-desktop
              ;;
            web)
              apt_retry sudo apt-get update
              apt_retry sudo apt-get install -y --no-install-recommends ffmpeg x11-utils xvfb
              ;;
            windows)
              choco install ffmpeg -y
              flutter config --enable-windows-desktop
              ;;
          esac

      - name: Enable KVM (Android only)
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Bootstrap workspace
        timeout-minutes: 10
        run: flutter pub get

      # ── Launch app and verify all capabilities ─────────────────────────
      - name: Run exhaustive capability verifier (Android)
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 60
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/caps-out
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
            -camera-back none -camera-front none
          script: >-
            set -e;
            adb devices;
            cd "$GITHUB_WORKSPACE/examples/cockpit_demo";
            dart run tool/verify_platforms.dart --platform android
            --exhaustive-system-control
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo"
            --output-root "$OUTPUT_ROOT"
            --output "$RESULT_JSON"
            --output-format json
            --android-emulator-id "Pixel_9_Pro"
            --launch-timeout-seconds 600
            --device-timeout-seconds 600 2>&1 | tee "$LOG_PATH"

      - name: Boot iOS simulator
        if: matrix.platform == 'ios'
        timeout-minutes: 12
        run: |
          set -eo pipefail
          IOS_DEVICE_CANDIDATES="$(python3 - <<'PY'
          import json, subprocess, sys
          data = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )
          preferred = ("iPhone 17", "iPhone 16", "iPhone 15", "iPhone 14")
          devices = []
          for runtime, entries in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for entry in entries:
                  if entry.get("isAvailable") and "iPhone" in entry.get("name", ""):
                      devices.append(entry)
          def sort_key(entry):
              name = entry["name"]
              try:
                  rank = next(i for i, prefix in enumerate(preferred) if name.startswith(prefix))
              except StopIteration:
                  rank = len(preferred)
              return (rank, name)
          if not devices:
              sys.exit("No available iOS simulator device found.")
          devices.sort(key=sort_key)
          for entry in devices[:4]:
              print(f"{entry['udid']} {entry['name']}")
          PY
          )"
          IOS_DEVICE_ID=""
          while IFS= read -r candidate; do
            [ -n "$candidate" ] || continue
            CANDIDATE_ID="${candidate%% *}"
            xcrun simctl shutdown "$CANDIDATE_ID" || true
            xcrun simctl boot "$CANDIDATE_ID" || true
            if python3 - "$CANDIDATE_ID" <<'PY'
          import subprocess, sys
          try:
              subprocess.run(["xcrun", "simctl", "bootstatus", sys.argv[1], "-b"],
                             check=True, timeout=150)
          except (subprocess.TimeoutExpired, subprocess.CalledProcessError) as error:
              sys.exit(getattr(error, 'returncode', 124))
          PY
            then
              IOS_DEVICE_ID="$CANDIDATE_ID"
              break
            fi
            xcrun simctl shutdown "$CANDIDATE_ID" || true
          done <<< "$IOS_DEVICE_CANDIDATES"
          if [ -z "$IOS_DEVICE_ID" ]; then
            echo "No iOS simulator reached booted state." >&2
            exit 1
          fi
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"

      - name: Run exhaustive capability verifier (iOS)
        if: matrix.platform == 'ios'
        working-directory: examples/cockpit_demo
        timeout-minutes: 60
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/caps-out
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        run: |
          set +e
          set -o pipefail
          dart run tool/verify_platforms.dart --platform ios \
            --exhaustive-system-control \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 2400 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Run exhaustive capability verifier (macOS)
        if: matrix.platform == 'macos'
        working-directory: examples/cockpit_demo
        timeout-minutes: 40
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/caps-out
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        run: |
          set +e
          set -o pipefail
          dart run tool/verify_platforms.dart --platform macos \
            --exhaustive-system-control \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 600 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Run exhaustive capability verifier (Linux)
        if: matrix.platform == 'linux'
        working-directory: examples/cockpit_demo
        timeout-minutes: 40
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/caps-out
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        run: |
          set +e
          set -o pipefail
          xvfb-run -a dart run tool/verify_platforms.dart --platform linux \
            --exhaustive-system-control \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 600 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Run exhaustive capability verifier (Web)
        if: matrix.platform == 'web'
        working-directory: examples/cockpit_demo
        timeout-minutes: 40
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/caps-out
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        run: |
          set +e
          set -o pipefail
          xvfb-run -a dart run tool/verify_platforms.dart --platform web \
            --exhaustive-system-control \
            --project-dir "$GITHUB_WORKSPACE/examples/cockpit_demo" \
            --output-root "$OUTPUT_ROOT" \
            --output "$RESULT_JSON" \
            --output-format json \
            --launch-timeout-seconds 600 2>&1 | tee "$LOG_PATH"
          STATUS=${PIPESTATUS[0]}
          set +o pipefail
          set -e
          exit "$STATUS"

      - name: Run exhaustive capability verifier (Windows)
        if: matrix.platform == 'windows'
        working-directory: examples/cockpit_demo
        timeout-minutes: 50
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/caps-out
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          dart run tool/verify_platforms.dart --platform windows `
            --exhaustive-system-control `
            --project-dir "$env:GITHUB_WORKSPACE/examples/cockpit_demo" `
            --output-root "$env:OUTPUT_ROOT" `
            --output "$env:RESULT_JSON" `
            --output-format json `
            --launch-timeout-seconds 600 2>&1 | Tee-Object -FilePath "$env:LOG_PATH"
          exit $LASTEXITCODE

      - name: Print diagnostics
        if: failure()
        shell: bash
        env:
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
          LOG_PATH: ${{ runner.temp }}/caps-result.log
        run: |
          [ -f "$LOG_PATH" ] && tail -80 "$LOG_PATH" || true
          [ -f "$RESULT_JSON" ] && cat "$RESULT_JSON" || true

      - name: Verify capability matrix
        shell: bash
        env:
          EXPECTED_ADAPTER: ${{ matrix.adapter }}
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          RESULT_JSON: ${{ runner.temp }}/caps-result.json
        run: |
          PY=python3
          command -v python3 >/dev/null 2>&1 || PY=python
          "$PY" - "$RESULT_JSON" <<'PY'
          import json, os, pathlib, sys

          caps_path = pathlib.Path(os.environ["RESULT_JSON"])
          if not caps_path.is_file():
              print(f"Result file not found: {caps_path}", file=sys.stderr)
              sys.exit(1)

          data = json.loads(caps_path.read_text())
          assert data["success"] is True, data
          assert len(data["platforms"]) == 1
          p = data["platforms"][0]
          platform = os.environ["EXPECTED_PLATFORM"]
          assert p["platform"] == platform, p
          assert p["status"] == "passed", p
          # Web has no system control adapter or actions by design.
          verified = set(p.get("systemVerifiedActions") or [])
          if platform == "web":
              assert p.get("systemControlAdapter") == "browser.dom+host-recording", p
              assert p.get("systemAvailableActions") == [], p
              assert verified == set(), p
              print(f"PASS {platform}: no native system control actions")
          else:
              adapter = p.get("systemControlAdapter")
              assert adapter == os.environ["EXPECTED_ADAPTER"], p
              available = set(p.get("systemAvailableActions") or [])
              assert "readSystemState" in available, p
              assert "readProcessList" in available, p
              assert "readSystemState" in verified, p
              assert "readProcessList" in verified, p
              missing = verified - available
              assert not missing, f"{platform}: verified unavailable actions: {sorted(missing)}"
              print(f"PASS {platform}: adapter={adapter}")
              print(f"  available: {len(available)} actions")
              print(f"  verified: {len(verified)} actions: {sorted(verified)}")

          platform_distinctive = {
              "android": {"setNetworkSpeed", "setNetworkDelay"},
              "ios": {"setStatusBar", "clearStatusBar"},
          }
          distinctive = platform_distinctive.get(platform, set())
          missing_distinctive = distinctive - verified
          assert not missing_distinctive, f"{platform}: missing distinctive: {sorted(missing_distinctive)}"
          PY

      - name: Upload capability bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: platform-capabilities-${{ matrix.platform }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/caps-out
            ${{ runner.temp }}/caps-result.json
            ${{ runner.temp }}/caps-result.log
