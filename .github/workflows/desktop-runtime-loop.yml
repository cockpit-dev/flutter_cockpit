          EOF
          echo "OUTPUT_ROOT=$OUTPUT_ROOT" >> "$GITHUB_ENV"
          echo "RESULT_JSON=$RESULT_JSON" >> "$GITHUB_ENV"
          echo "CONFIG_JSON=$CONFIG_JSON" >> "$GITHUB_ENV"

      - name: Run Windows validate-task smoke
        shell: bash
        run: |
