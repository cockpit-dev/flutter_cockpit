name: desktop-runtime-loop

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux-runtime-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            xvfb \
            x11-utils \
            wmctrl \
            ffmpeg

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Bootstrap workspace
        run: dart run melos bootstrap

      - name: Run Linux desktop devtools regression tests
        working-directory: packages/flutter_cockpit_devtools
        run: |
          dart test \
            test/src/session/cockpit_linux_remote_session_launcher_test.dart \
            test/src/application/cockpit_launch_development_session_service_test.dart \
            test/src/capture/cockpit_linux_capture_adapter_test.dart \
            test/src/capture/cockpit_capture_strategy_resolver_test.dart \
            test/src/recording/cockpit_linux_recording_adapter_test.dart \
            test/src/recording/cockpit_recording_strategy_resolver_test.dart

      - name: Build cockpit demo Linux shell
        working-directory: examples/cockpit_demo
        run: flutter build linux --debug -t cockpit/main.dart

      - name: Write Linux validate-task config
        shell: bash
        run: |
          OUTPUT_ROOT="$RUNNER_TEMP/flutter_cockpit_linux_out"
          RESULT_JSON="$RUNNER_TEMP/flutter_cockpit_linux_validate.json"
          CONFIG_JSON="$RUNNER_TEMP/flutter_cockpit_linux_validate_task.json"
          cat > "$CONFIG_JSON" <<EOF
          {
            "runTask": {
              "launch": {
                "projectDir": "$GITHUB_WORKSPACE/examples/cockpit_demo",
                "target": "cockpit/main.dart",
                "platform": "linux",
                "deviceId": "linux",
                "sessionPort": 47331,
                "launchTimeoutSeconds": 180
              },
              "baseline": {
                "captureScreenshot": true,
                "screenshotName": "linux-baseline",
                "includeSnapshot": true
              },
              "script": {
                "sessionId": "linux-desktop-smoke-session",
                "taskId": "linux-desktop-smoke-task",
                "platform": "linux",
                "recording": {
                  "purpose": "acceptance",
                  "name": "linux-desktop-acceptance",
                  "attachToStep": true,
                  "tailStabilizationMs": 1800
                },
                "commands": [
                  {
                    "commandId": "tap-today",
                    "commandType": "tap",
                    "locator": {
                      "kind": "text",
                      "value": "Today"
                    }
                  },
                  {
                    "commandId": "capture-acceptance",
                    "commandType": "captureScreenshot",
                    "screenshotRequest": {
                      "reason": "acceptance",
                      "name": "linux-acceptance",
                      "includeSnapshot": true,
                      "attachToStep": true
                    }
                  }
                ],
                "failFast": true
              },
              "outputRoot": "$OUTPUT_ROOT"
            },
            "validation": {
              "requireAcceptanceMarkdown": true,
              "requirePrimaryScreenshot": true,
              "requirePrimaryRecording": true,
              "requireArtifactFiles": true,
              "requireAcceptanceSemanticEvidence": true
            }
          }
          EOF
          echo "OUTPUT_ROOT=$OUTPUT_ROOT" >> "$GITHUB_ENV"
          echo "RESULT_JSON=$RESULT_JSON" >> "$GITHUB_ENV"
          echo "CONFIG_JSON=$CONFIG_JSON" >> "$GITHUB_ENV"

      - name: Run Linux validate-task smoke
        shell: bash
        run: |
          xvfb-run -a dart run flutter_cockpit_devtools:flutter_cockpit_devtools \
            validate-task \
            --config-json "$CONFIG_JSON" \
            --output-json "$RESULT_JSON"

      - name: Verify Linux smoke result
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          result_path = pathlib.Path(os.environ["RESULT_JSON"])
          data = json.loads(result_path.read_text())
          assert data["classification"] == "completed", data
          summary = data["bundleSummary"]
          assert summary["deliveryArtifactsReady"] is True, summary
          assert summary["deliveryVideoReady"] is True, summary
          assert summary["deliveryKeyframesReady"] is True, summary
          PY

      - name: Upload Linux runtime loop bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-runtime-loop-bundle
          path: |
            ${{ env.OUTPUT_ROOT }}
            ${{ env.RESULT_JSON }}

  windows-runtime-loop:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
