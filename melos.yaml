name: flutter_cockpit_workspace

packages:
  - packages/flutter_cockpit_protocol
  - packages/flutter_cockpit
  - packages/cockpit
  - examples/cockpit_demo
  - examples/cockpit_demo/cockpit

scripts:
  analyze:
    run: dart analyze
  test:
    run: >-
      (dart test test) &&
      (flutter test packages/flutter_cockpit/test) &&
      (dart test packages/cockpit/test) &&
      (cd examples/cockpit_demo && flutter test) &&
      (cd examples/cockpit_demo/cockpit && flutter test)
