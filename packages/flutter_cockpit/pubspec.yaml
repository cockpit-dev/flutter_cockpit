name: flutter_cockpit
description: In-app runtime primitives for AI-driven Flutter development workflows.
version: 1.0.0
homepage: https://github.com/cockpit-dev/flutter_cockpit
repository: https://github.com/cockpit-dev/flutter_cockpit
issue_tracker: https://github.com/cockpit-dev/flutter_cockpit/issues
documentation: https://github.com/cockpit-dev/flutter_cockpit/tree/main/packages/flutter_cockpit
topics:
  - flutter
  - automation
  - testing
  - ai
  - developer-tools

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

resolution: workspace

dependencies:
  collection: ^1.18.0
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

  path: ^1.9.0
  test: '>=1.25.15 <2.0.0'
flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: dev.cockpit.flutter_cockpit
        pluginClass: FlutterCockpitPlugin
      ios:
        pluginClass: FlutterCockpitPlugin
      linux:
        pluginClass: FlutterCockpitPlugin
      macos:
        pluginClass: FlutterCockpitPlugin
      windows:
        pluginClass: FlutterCockpitPluginCApi
      web:
        pluginClass: FlutterCockpitWeb
        fileName: src/web/flutter_cockpit_web.dart
