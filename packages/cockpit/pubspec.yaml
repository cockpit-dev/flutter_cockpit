name: cockpit
description: Host-side tooling for flutter_cockpit task execution and artifact handling.
version: 1.1.1
homepage: https://github.com/cockpit-dev/flutter_cockpit
repository: https://github.com/cockpit-dev/flutter_cockpit
issue_tracker: https://github.com/cockpit-dev/flutter_cockpit/issues
documentation: https://github.com/cockpit-dev/flutter_cockpit/tree/main/packages/cockpit
topics:
  - flutter
  - cli
  - tooling
  - ai
  - mcp
executables:
  cockpit:
  cockpit_mcp:

environment:
  sdk: '>=3.8.0 <4.0.0'

resolution: workspace

dependencies:
  args: ^2.7.0
  dart_mcp: ^0.5.1
  file: ^7.0.1
  flutter_cockpit: ^1.1.0
  http: ^1.3.0
  image: ^4.5.4
  path: ^1.9.0
  process: ^5.0.3
  stream_channel: ^2.1.4
  yaml: ^3.1.3

  collection: ^1.19.1
dev_dependencies:
  lints: ^6.1.0
  test: '>=1.25.15 <2.0.0'
