schemaVersion: 1
sessionId: cockpit-demo-rapid-smoke
taskId: rapid-smoke
platform: macos
failFast: true
steps:
  - stepId: wait-inbox
    stepType: retry
    description: Wait until the inbox screen is ready before collecting proof.
    maxAttempts: 4
    delayMs: 500
    step:
      stepType: command
      command:
        commandId: assert-inbox-ready
        commandType: assertText
        parameters:
          text: Inbox
  - stepId: capture-inbox
    stepType: command
    description: Capture acceptance evidence for the loaded inbox.
    command:
      commandId: capture-inbox
      commandType: captureScreenshot
      screenshotRequest:
        name: rapid_smoke_inbox
        reason: acceptance
        includeSnapshot: true
        attachToStep: true
  - stepId: assert-new-task-action
    stepType: retry
    description: Confirm the primary task creation action is available.
    maxAttempts: 4
    delayMs: 500
    step:
      stepType: command
      command:
        commandId: assert-new-task-action
        commandType: assertText
        parameters:
          text: New task
