runTask:
  launch:
    projectDir: .
    target: main.dart
    platform: macos
    deviceId: macos
    sessionPort: 58491
    launchTimeoutSeconds: 600
    persistHandlePath: .dart_tool/cockpit_validation_examples/macos_app.json
  script:
    schemaVersion: 1
    sessionId: cockpit-demo-validate-task
    taskId: macos-recorded-acceptance
    platform: macos
    failFast: true
    steps:
      - stepId: start-acceptance-recording
        stepType: startRecording
        recording:
          purpose: acceptance
          name: validate_task_acceptance
          mode: auto
          attachToStep: true
          tailStabilizationMs: 1400
      - stepId: wait-inbox
        stepType: retry
        description: Wait until the inbox screen is ready before recording visible navigation.
        maxAttempts: 4
        delayMs: 500
        step:
          stepType: command
          command:
            commandId: assert-inbox-ready
            commandType: assertText
            parameters:
              text: Inbox
      - stepId: open-today
        stepType: command
        description: Navigate to Today so the recording contains a visible route change.
        command:
          commandId: open-today-tab
          commandType: tap
          locator:
            text: Today
            route: /inbox
          parameters:
            expectedRouteName: /today
            routeTimeoutMs: 5000
          timeoutMs: 8000
      - stepId: wait-today
        stepType: command
        description: Confirm the Today route is visible before returning.
        command:
          commandId: wait-today-route
          commandType: waitFor
          timeoutMs: 8000
          parameters:
            routeName: /today
      - stepId: return-inbox
        stepType: command
        description: Return to Inbox so the recording captures both directions.
        command:
          commandId: return-inbox-tab
          commandType: tap
          locator:
            text: Inbox
            route: /today
          parameters:
            expectedRouteName: /inbox
            routeTimeoutMs: 5000
          timeoutMs: 8000
      - stepId: wait-inbox-returned
        stepType: command
        description: Confirm the final route before capturing acceptance evidence.
        command:
          commandId: wait-inbox-returned
          commandType: waitFor
          timeoutMs: 8000
          parameters:
            routeName: /inbox
      - stepId: capture-acceptance
        stepType: command
        description: Capture final Inbox evidence after the recorded navigation.
        command:
          commandId: capture-acceptance
          commandType: captureScreenshot
          screenshotRequest:
            name: validate_task_acceptance
            reason: acceptance
            includeSnapshot: true
            attachToStep: true
      - stepId: stop-acceptance-recording
        stepType: stopRecording
        settleMs: 1400
  outputRoot: .dart_tool/cockpit_validation_examples/validate_task_bundle
  baseline:
    captureScreenshot: true
    screenshotName: validate_task_baseline
    includeSnapshot: true
  requirements:
    requireScreenshotEvidence: true
    requireVideoEvidence: true
validation:
  expectedClassification: completed
  requireAcceptanceMarkdown: true
  requireEnvironmentSnapshot: true
  requirePrimaryScreenshot: true
  requirePrimaryRecording: true
  requireArtifactFiles: true
  requireAcceptanceSemanticEvidence: true
