schemaVersion: 1
sessionId: cockpit-demo-commands-only
taskId: commands-only-smoke
platform: macos
failFast: true
commands:
  - commandId: assert-inbox-ready
    commandType: assertText
    parameters:
      text: Inbox
  - commandId: capture-command-list-proof
    commandType: captureScreenshot
    parameters:
      name: commands_only_inbox
      purpose: acceptance
    screenshotRequest:
      reason: acceptance
      name: commands_only_inbox
      includeSnapshot: true
      attachToStep: true
      snapshotOptions:
        profile: baseline
        maxTargets: 30
        maxAncestorsPerTarget: 1
        maxPropertiesPerTarget: 6
