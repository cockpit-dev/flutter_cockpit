schemaVersion: 1
sessionId: cockpit-demo-comprehensive
taskId: comprehensive-workflow
platform: macos
environment:
  platform: macos
  flutterVersion: "3.32.0"
  dartVersion: "3.8.0"
recording:
  purpose: acceptance
  name: comprehensive_full_run
  mode: auto
  attachToStep: false
  tailStabilizationMs: 1400
failFast: true
steps:
  - stepId: wait-inbox-ready
    stepType: retry
    maxAttempts: 4
    delayMs: 500
    step:
      stepType: command
      command:
        commandId: wait-inbox-route
        commandType: waitFor
        timeoutMs: 12000
        parameters:
          routeName: /inbox

  - stepId: start-editor-recording
    stepType: startRecording
    recording:
      purpose: repro
      name: comprehensive_editor_segment
      mode: auto
      attachToStep: true
      tailStabilizationMs: 1000

  - stepId: open-editor
    stepType: command
    command:
      commandId: tap-new-task
      commandType: tap
      locator:
        key: open-task-editor-action
        text: New task
        type: TextButton
        route: /inbox
        ancestor:
          route: /inbox
        fallbacks:
          - text: Create task
            type: FilledButton
            route: /inbox
          - text: New task
            ancestor:
              route: /inbox
      parameters:
        expectedRouteName: /editor
        routeTimeoutMs: 5000
      timeoutMs: 8000
      capturePolicy: onFailure
      captureFailurePolicy: degradeCommand

  - stepId: wait-editor-title
    stepType: command
    command:
      commandId: assert-title-field-visible
      commandType: assertVisible
      locator:
        text: Task title
        ancestor:
          route: /editor
      timeoutMs: 8000

  - stepId: assert-editor-copy
    stepType: command
    command:
      commandId: assert-editor-copy
      commandType: assertText
      parameters:
        text: Task title

  - stepId: edit-title
    stepType: command
    command:
      commandId: enter-title
      commandType: enterText
      locator:
        text: Task title
        type: TextField
        ancestor:
          route: /editor
      parameters:
        text: Cockpit comprehensive YAML example
      capturePolicy: afterAction
      captureFailurePolicy: degradeCommand

  - stepId: focus-title
    stepType: command
    command:
      commandId: focus-title
      commandType: focusTextInput
      locator:
        text: Task title
        type: TextField
        ancestor:
          route: /editor

  - stepId: set-title-editing-value
    stepType: command
    command:
      commandId: set-title-editing-value
      commandType: setTextEditingValue
      locator:
        text: Task title
        type: TextField
        ancestor:
          route: /editor
      parameters:
        text: Cockpit comprehensive YAML example
        selectionBase: 37
        selectionExtent: 37

  - stepId: submit-title-action
    stepType: command
    command:
      commandId: submit-title-action
      commandType: sendTextInputAction
      locator:
        text: Task title
        type: TextField
        ancestor:
          route: /editor
      parameters:
        action: done

  - stepId: keyboard-typing-examples
    stepType: if
    condition:
      commandId: can-see-title-field
      commandType: assertText
      parameters:
        text: Task title
    thenSteps:
      - stepId: key-event-space
        stepType: command
        command:
          commandId: send-space-key-event
          commandType: sendKeyEvent
          parameters:
            key: space
      - stepId: key-down-shift
        stepType: command
        command:
          commandId: send-shift-down
          commandType: sendKeyDownEvent
          parameters:
            key: shiftLeft
      - stepId: key-up-shift
        stepType: command
        command:
          commandId: send-shift-up
          commandType: sendKeyUpEvent
          parameters:
            key: shiftLeft
    elseSteps: []

  - stepId: reveal-notes
    stepType: command
    command:
      commandId: scroll-to-notes
      commandType: scrollUntilVisible
      locator:
        text: Notes
        route: /editor
        ancestor:
          route: /editor
      parameters:
        maxScrolls: 6
        viewportFraction: 0.72
        continuous: true
        durationPerStepMs: 180
        revealAlignment: center

  - stepId: notes-gesture-samples
    stepType: if
    condition:
      commandId: notes-visible
      commandType: assertVisible
      locator:
        text: Notes
        ancestor:
          route: /editor
    thenSteps:
      - stepId: long-press-notes
        stepType: command
        command:
          commandId: long-press-notes
          commandType: longPress
          locator:
            text: Notes
            ancestor:
              route: /editor
          parameters:
            durationMs: 500
      - stepId: double-tap-notes
        stepType: command
        command:
          commandId: double-tap-notes
          commandType: doubleTap
          locator:
            text: Notes
            ancestor:
              route: /editor
      - stepId: drag-editor
        stepType: command
        command:
          commandId: drag-editor
          commandType: drag
          parameters:
            startX: 320
            startY: 620
            endX: 320
            endY: 420
            durationMs: 240
      - stepId: fling-editor
        stepType: command
        command:
          commandId: fling-editor
          commandType: fling
          parameters:
            startX: 320
            startY: 620
            velocityX: 0
            velocityY: -900
      - stepId: swipe-editor
        stepType: command
        command:
          commandId: swipe-editor
          commandType: swipe
          parameters:
            startX: 320
            startY: 620
            endX: 320
            endY: 460
            durationMs: 220
      - stepId: pinch-editor
        stepType: command
        command:
          commandId: pinch-editor
          commandType: pinchZoom
          parameters:
            centerX: 320
            centerY: 520
            startDistance: 120
            endDistance: 150
            durationMs: 220
      - stepId: rotate-editor
        stepType: command
        command:
          commandId: rotate-editor
          commandType: rotate
          parameters:
            centerX: 320
            centerY: 520
            degrees: 8
            durationMs: 220
      - stepId: pan-zoom-editor
        stepType: command
        command:
          commandId: pan-zoom-editor
          commandType: panZoom
          parameters:
            startX: 320
            startY: 520
            panX: 0
            panY: -80
            scale: 1.0
            durationMs: 220
      - stepId: multi-touch-editor
        stepType: command
        command:
          commandId: multi-touch-editor
          commandType: multiTouch
          parameters:
            pointers:
              - pointer: 1
                events:
                  - type: down
                    x: 260
                    y: 520
                  - type: up
                    x: 260
                    y: 520
              - pointer: 2
                events:
                  - type: down
                    x: 380
                    y: 520
                  - type: up
                    x: 380
                    y: 520
    elseSteps: []

  - stepId: semantic-actions
    stepType: if
    condition:
      commandId: has-priority-control
      commandType: assertText
      parameters:
        text: Priority
    thenSteps:
      - stepId: show-priority-control
        stepType: command
        command:
          commandId: show-priority-control
          commandType: showOnScreen
          locator:
            text: Priority
            ancestor:
              route: /editor
      - stepId: increase-priority
        stepType: command
        command:
          commandId: increase-priority
          commandType: increase
          locator:
            text: Priority
            ancestor:
              route: /editor
      - stepId: decrease-priority
        stepType: command
        command:
          commandId: decrease-priority
          commandType: decrease
          locator:
            text: Priority
            ancestor:
              route: /editor
      - stepId: dismiss-priority-popup
        stepType: command
        command:
          commandId: dismiss-priority-popup
          commandType: dismiss
          locator:
            text: Priority
            ancestor:
              route: /editor
    elseSteps: []

  - stepId: capture-editor-evidence
    stepType: command
    command:
      commandId: capture-editor-evidence
      commandType: captureScreenshot
      screenshotRequest:
        name: comprehensive_editor
        reason: assertion_failure
        includeSnapshot: true
        attachToStep: true

  - stepId: collect-editor-snapshot
    stepType: command
    command:
      commandId: collect-editor-snapshot
      commandType: collectSnapshot
      snapshotOptions:
        profile: investigate
        maxTargets: 48
        maxAncestorsPerTarget: 3
        maxPropertiesPerTarget: 12
        includeStyleDetails: true
        includeDiagnosticProperties: true
        emitArtifactWhenLarge: true
        includeRebuildActivity: true
        maxRebuildEntries: 12
        includeNetworkActivity: true
        maxNetworkEntries: 16
        networkQuery:
          onlyFailures: true
          statusCodeAtLeast: 400
        includeRuntimeActivity: true
        maxRuntimeEntries: 16
        runtimeQuery:
          onlyErrors: true
          messageContains: error
        includeAccessibilitySummary: true
        maxAccessibilityEntries: 16

  - stepId: wait-idle-and-network
    stepType: command
    command:
      commandId: wait-ui-idle
      commandType: waitForUiIdle
      timeoutMs: 10000
      parameters:
        quietMillis: 500

  - stepId: clear-network
    stepType: command
    command:
      commandId: clear-network-activity
      commandType: clearNetworkActivity

  - stepId: wait-network-idle
    stepType: command
    command:
      commandId: wait-network-idle
      commandType: waitForNetworkIdle
      timeoutMs: 10000
      parameters:
        quietMillis: 500

  - stepId: optional-conflict-loop
    stepType: loop
    maxIterations: 2
    condition:
      commandId: has-conflict
      commandType: assertText
      parameters:
        text: Conflicts
    steps:
      - stepId: capture-conflict-loop
        stepType: command
        command:
          commandId: capture-conflict-loop
          commandType: captureScreenshot
          screenshotRequest:
            name: comprehensive_conflict_loop
            reason: assertion_failure
            includeSnapshot: true
            attachToStep: true

  - stepId: dismiss-keyboard
    stepType: command
    command:
      commandId: dismiss-keyboard
      commandType: dismissKeyboard

  - stepId: navigate-back
    stepType: command
    command:
      commandId: back-to-inbox
      commandType: back
      parameters:
        expectedRouteName: /inbox
        routeTimeoutMs: 5000

  - stepId: stop-editor-recording
    stepType: stopRecording
    settleMs: 1400
