schemaVersion: 1
sessionId: cockpit-demo-adaptive-flow
taskId: adaptive-flow
platform: macos
failFast: true
steps:
  - stepId: wait-inbox
    stepType: retry
    maxAttempts: 4
    delayMs: 500
    step:
      stepType: command
      command:
        commandId: assert-inbox-ready
        commandType: assertText
        parameters:
          text: Inbox
  - stepId: close-settings-if-open
    stepType: if
    condition:
      commandId: has-settings
      commandType: assertText
      parameters:
        text: Settings
    thenSteps:
      - stepId: close-settings
        stepType: command
        command:
          commandId: close-settings
          commandType: tap
          locator:
            tooltip: Close
    elseSteps: []
  - stepId: drain-visible-conflicts
    stepType: loop
    maxIterations: 2
    condition:
      commandId: has-conflict-chip
      commandType: assertText
      parameters:
        text: Conflicts
    steps:
      - stepId: capture-conflict-state
        stepType: command
        command:
          commandId: capture-conflict-state
          commandType: captureScreenshot
          screenshotRequest:
            name: adaptive_conflict_state
            reason: assertion_failure
            includeSnapshot: true
            attachToStep: true
  - stepId: capture-final-state
    stepType: command
    command:
      commandId: capture-final-state
      commandType: captureScreenshot
      screenshotRequest:
        name: adaptive_final_state
        reason: acceptance
        includeSnapshot: true
        attachToStep: true
