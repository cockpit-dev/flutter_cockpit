schemaVersion: 1
sessionId: cockpit-demo-rapid-smoke
taskId: rapid-smoke
platform: macos
failFast: true
steps:
  - stepId: wait-inbox
    stepType: retry
    maxAttempts: 4
    delayMs: 500
    step:
      stepType: command
      command:
        commandId: assert-inbox-ready
        commandType: assertText
        parameters:
          text: Inbox
  - stepId: capture-inbox
    stepType: command
    command:
      commandId: capture-inbox
      commandType: captureScreenshot
      screenshotRequest:
        name: rapid_smoke_inbox
        reason: acceptance
        includeSnapshot: true
        attachToStep: true
  - stepId: assert-empty-canvas
    stepType: retry
    maxAttempts: 4
    delayMs: 500
    step:
      stepType: command
      command:
        commandId: assert-empty-canvas
        commandType: assertText
        parameters:
          text: Fresh canvas
  - stepId: assert-empty-action
    stepType: command
    command:
      commandId: assert-empty-action
      commandType: assertText
      parameters:
        text: Create task
