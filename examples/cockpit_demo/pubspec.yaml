name: cockpit_demo
description: Demo Flutter app for validating flutter_cockpit workflows.
publish_to: none
version: 1.0.0

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

resolution: workspace

dependencies:
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_cockpit: ^1.0.0
  flutter_cockpit_devtools: ^1.0.0
  path_provider: ^2.1.5
  sqlite3: ^3.3.3
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  args: ^2.7.0
  build_runner: ^2.4.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  path: ^1.9.0
  test: '>=1.25.15 <2.0.0'

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/manrope/Manrope[wght].ttf
          weight: 400
        - asset: assets/fonts/manrope/Manrope[wght].ttf
          weight: 600
        - asset: assets/fonts/manrope/Manrope[wght].ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/space_grotesk/SpaceGrotesk[wght].ttf
          weight: 400
        - asset: assets/fonts/space_grotesk/SpaceGrotesk[wght].ttf
          weight: 700
