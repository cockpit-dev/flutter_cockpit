name: cockpit_demo
description: Demo Flutter app for validating flutter_cockpit workflows.
publish_to: none
version: 1.0.0

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.24.0'

resolution: workspace

dependencies:
  drift: 2.21.0
  drift_flutter: 0.2.3
  flutter:
    sdk: flutter
  flutter_cockpit: ^1.0.0
  flutter_cockpit_devtools: ^1.0.0
  path_provider: ^2.1.5
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.24

dev_dependencies:
  build_runner: 2.4.9
  drift_dev: 2.21.2
  flutter_lints: 5.0.0
  flutter_test:
    sdk: flutter
  path: ^1.9.0

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/manrope/Manrope[wght].ttf
          weight: 400
        - asset: assets/fonts/manrope/Manrope[wght].ttf
          weight: 600
        - asset: assets/fonts/manrope/Manrope[wght].ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/space_grotesk/SpaceGrotesk[wght].ttf
          weight: 400
        - asset: assets/fonts/space_grotesk/SpaceGrotesk[wght].ttf
          weight: 700
