name: flutter_cockpit_workspace
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'

workspace:
  - packages/flutter_cockpit
  - packages/flutter_cockpit_devtools
  - examples/cockpit_demo

dev_dependencies:
  lints: ^6.1.0
  melos: 6.3.3
  test: 1.25.15

melos:
  scripts:
    analyze: dart analyze
    test: >-
      (dart test test) &&
      (cd packages/flutter_cockpit && flutter test) &&
      (cd packages/flutter_cockpit_devtools && dart test) &&
      (cd examples/cockpit_demo && flutter test)
